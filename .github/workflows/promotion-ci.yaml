name: promotion service ci

on:
  push:
    branches: ["**"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      service_name: ${{ steps.detect.outputs.SERVICE_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/workflows/actions

      - name: Detect Service Name
        id: detect
        run: |
          FILE="${GITHUB_WORKFLOW_REF##*/}"
          FILE="${FILE%@*}"
          SERVICE="${FILE%-ci.yaml}"
          echo "SERVICE_NAME=$SERVICE" >> $GITHUB_ENV
          echo "SERVICE_NAME=$SERVICE" >> $GITHUB_OUTPUT

      - name: Run Maven Build & Test
        run: mvn clean install -pl promotion -am

      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl promotion -am -Dcheckstyle.output.file=promotion-checkstyle-result.xml

      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/promotion-checkstyle-result.xml'

      - name: Test Results Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Promotion-Unit-Test-Results
          path: "promotion/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Upload Jacoco Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-promotion
          path: promotion/target/site/jacoco/jacoco.xml
          retention-days: 1

      - name: Analyze with SonarCloud
        id: sonar
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl promotion -am -f pom.xml
          -Dsonar.coverage.jacoco.xmlReportPaths=promotion/target/site/jacoco/jacoco.xml

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        run: echo "Pushing Docker image for promotion..."
        # Thêm các step docker build/push tại đây nếu cần

  Check-Coverage:
    needs: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Jacoco Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-promotion
          path: target/jacoco-data

      - name: Add Coverage Report to PR
        id: jacoco_reporter
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/target/jacoco-data/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Promotion Coverage Report'
          update-comment: true

      - name: Fail if coverage is below threshold
        if: steps.jacoco_reporter.outputs.coverage-overall < 80
        run: |
          echo "❌ Overall coverage is below 80%!"
          exit 1
