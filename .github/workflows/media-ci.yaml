name: media service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -DskipTests -pl media -am -f pom.xml
      - name: Run Maven Verify
        run: mvn verify -DskipITs -pl media -am -f pom.xml
      - name: Unit Test Results
        uses: dorny/test-reporter@v1
        with:
          name: Unit-Test-Results
          path: "media/**/surefire-reports/*.xml"
          reporter: java-junit
      - name: Enforce coverage threshold (>=70%)
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          report_path = Path("media/target/site/jacoco/jacoco.xml")
          if not report_path.exists():
              raise SystemExit("JaCoCo report not found at media/target/site/jacoco/jacoco.xml")
          root = ET.parse(report_path).getroot()
          line_counter = next((c for c in root.findall("counter") if c.attrib.get("type") == "LINE"), None)
          if line_counter is None:
              raise SystemExit("No LINE counter in JaCoCo report")
          missed = int(line_counter.attrib["missed"])
          covered = int(line_counter.attrib["covered"])
          total = missed + covered
          coverage = (covered / total * 100.0) if total else 0.0
          print(f"Line coverage: {covered}/{total} = {coverage:.2f}%")
          if coverage < 70.0:
              raise SystemExit(f"Coverage gate failed: {coverage:.2f}% < 70.00%")
          PY
      - name: Upload JaCoCo report artifacts
        uses: actions/upload-artifact@v4
        if: ${{ success() || failure() }}
        with:
          name: media-jacoco-report
          path: |
            media/target/site/jacoco/index.html
            media/target/site/jacoco/jacoco.xml
            media/target/site/jacoco/jacoco.csv
      - name: Analyze with sonar cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl media -am -f pom.xml
          -Dsonar.coverage.jacoco.xmlReportPaths=media/target/site/jacoco/jacoco.xml
      - name: SonarCloud Summary
        if: always()
        run: |
          {
            echo "## SonarCloud Result"
            echo ""
            - Raw result: ${{ steps.sonar.outcome }}
            - Final result: ${{ steps.sonar.conclusion }}
            echo "- Service: **cart**"
            echo "- Branch/Ref: **${{ github.ref_name }}**"
            echo "- Commit: \`${{ github.sha }}\`"
            echo ""
            echo "### Dashboard"
            echo "https://sonarcloud.io/dashboard?id=<YOUR_PROJECT_KEY>"
            echo ""
            echo "> Nếu fail do Quality Gate thì xem log step SonarCloud."
          } >> $GITHUB_STEP_SUMMARY
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./media
          push: true
          tags: ghcr.io/nashtech-garage/yas-media:latest
