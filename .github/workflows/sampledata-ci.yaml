name: sampledata service ci

on:
  push:
    branches: ["**"]
    paths:
      - "sampledata/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/sampledata-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "sampledata/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/sampledata-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Run Maven Build Command
        run: mvn clean install -pl sampledata -am

      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl sampledata -am -Dcheckstyle.output.file=sampledata-checkstyle-result.xml

      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/sampledata-checkstyle-result.xml'

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Sampledata-Unit-Test-Results
          path: "sampledata/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Upload Jacoco Report for Coverage Job
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-sampledata
          path: sampledata/target/site/jacoco/jacoco.xml
          retention-days: 1

      - name: Analyze with sonar cloud
        id: sonar
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl sampledata -am -f pom.xml
          -Dsonar.coverage.jacoco.xmlReportPaths=sampledata/target/site/jacoco/jacoco.xml

      - name: SonarCloud Summary
        if: always()
        run: |
          if [ "${{ steps.sonar.outcome }}" = "success" ]; then
            ICON="🟢"
            STATUS="PASS"
          else
            ICON="🔴"
            STATUS="FAIL"
          fi

          {
            echo "## SonarCloud Report: sampledata"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | $ICON **$STATUS** |"
            echo "| Service | \`sampledata\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo "### Dashboard"
            echo "https://sonarcloud.io/dashboard?id=<YOUR_PROJECT_KEY>"
          } >> $GITHUB_STEP_SUMMARY

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./sampledata
          push: true
          tags: ghcr.io/nashtech-garage/yas-sampledata:latest

  Check-Coverage:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Jacoco Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-sampledata
          path: target/jacoco-results

      - name: Add coverage report to PR
        id: jacoco_report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/target/jacoco-results/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Sampledata Coverage Report'
          update-comment: true

      - name: Write Coverage Summary
        if: always()
        run: |
          COVERAGE=${{ steps.jacoco_report.outputs.coverage-overall }}
          THRESHOLD=80
          
          if (( $(echo "$COVERAGE >= $THRESHOLD" | bc -l) )); then
            ICON="✅"
            STATUS="PASSED"
          else
            ICON="❌"
            STATUS="FAILED"
          fi

          {
            echo "## 📊 Coverage Summary: sampledata"
            echo ""
            echo "| Metric | Value | Threshold | Status |"
            echo "|--------|-------|-----------|--------|"
            echo "| Overall Coverage | $COVERAGE% | $THRESHOLD% | $ICON $STATUS |"
            echo "| Changed Files | ${{ steps.jacoco_report.outputs.coverage-changed-files }}% | 60% | - |"
            echo ""
            echo "Vui lòng kiểm tra chi tiết trong phần bình luận của Pull Request."
          } >> $GITHUB_STEP_SUMMARY

      - name: Enforce Threshold
        run: |
          COVERAGE=${{ steps.jacoco_report.outputs.coverage-overall }}
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Độ bao phủ code ($COVERAGE%) thấp hơn yêu cầu (80%)!"
            exit 1
          fi
