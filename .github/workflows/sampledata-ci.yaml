name: sampledata service ci

on:
  push:
    branches: ["**"]
    paths:
      - "sampledata/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/sampledata-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "sampledata/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/sampledata-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Run Maven Build Command
        run: mvn clean install -pl sampledata -am -DskipTests

      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl sampledata -am -Dcheckstyle.output.file=sampledata-checkstyle-result.xml

      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/sampledata-checkstyle-result.xml'

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./sampledata
          push: true
          tags: ghcr.io/nashtech-garage/yas-sampledata:latest

  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions

      - name: Run Unit Tests
        run: mvn test -pl sampledata -am

      - name: Test Results Summary (Tab)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Sampledata-Unit-Test-Results
          path: "sampledata/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Write Test Summary to Job
        if: always()
        run: |
          echo "## 🧪 Test Result: sampledata" >> $GITHUB_STEP_SUMMARY
          
          # Tìm các file xml kết quả và cộng dồn stats
          TEST_FILES=$(find sampledata/target/surefire-reports -name "TEST-*.xml" 2>/dev/null || true)
          
          if [ -z "$TEST_FILES" ]; then
            echo "❌ Không tìm thấy file kết quả test." >> $GITHUB_STEP_SUMMARY
          else
            TOTAL_TESTS=0
            TOTAL_FAILURES=0
            TOTAL_ERRORS=0
            TOTAL_SKIPPED=0

            for FILE in $TEST_FILES; do
              TESTS=$(grep -oE 'tests="[0-9]+"' "$FILE" | cut -d'"' -f2 | head -1)
              FAILURES=$(grep -oE 'failures="[0-9]+"' "$FILE" | cut -d'"' -f2 | head -1)
              ERRORS=$(grep -oE 'errors="[0-9]+"' "$FILE" | cut -d'"' -f2 | head -1)
              SKIPPED=$(grep -oE 'skipped="[0-9]+"' "$FILE" | cut -d'"' -f2 | head -1)
              
              TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
              TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
              TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            done

            TOTAL_PASSED=$((TOTAL_TESTS - TOTAL_FAILURES - TOTAL_ERRORS - TOTAL_SKIPPED))

            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $TOTAL_PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failures | $TOTAL_FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚠️ Errors | $TOTAL_ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $TOTAL_SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL_TESTS** |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Jacoco Report for Coverage Job
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-sampledata
          path: sampledata/target/site/jacoco/jacoco.xml
          retention-days: 1

  SonarCloud:
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions

      - name: Download Jacoco Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-sampledata
          path: sampledata/target/site/jacoco/

      - name: Analyze with sonar cloud
        id: sonar
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl sampledata -am -f pom.xml
          -Dsonar.coverage.jacoco.xmlReportPaths=sampledata/target/site/jacoco/jacoco.xml

      - name: SonarCloud Summary
        if: always()
        run: |
          if [ "${{ steps.sonar.outcome }}" = "success" ]; then
            ICON="🟢"
            STATUS="PASS"
          else
            ICON="🔴"
            STATUS="FAIL"
          fi

          {
            echo "## SonarCloud Report: sampledata"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | $ICON **$STATUS** |"
            echo "| Service | \`sampledata\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo "### Dashboard"
            echo "https://sonarcloud.io/dashboard?id=<YOUR_PROJECT_KEY>"
          } >> $GITHUB_STEP_SUMMARY

  Check-Coverage:
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Jacoco Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-sampledata
          path: target/jacoco-results

      - name: Add coverage report to PR
        id: jacoco_report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/target/jacoco-results/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Sampledata Coverage Report'
          update-comment: true

      - name: Write Coverage Summary
        if: always()
        run: |
          COVERAGE=${{ steps.jacoco_report.outputs.coverage-overall }}
          THRESHOLD=70
          
          if (( $(echo "$COVERAGE > $THRESHOLD" | bc -l) )); then
            ICON="✅"
            STATUS="PASSED"
          else
            ICON="❌"
            STATUS="FAILED"
          fi

          {
            echo "## 📊 Coverage Summary: sampledata"
            echo ""
            echo "| Metric | Value | Threshold | Status |"
            echo "|--------|-------|-----------|--------|"
            echo "| Overall Coverage | $COVERAGE% | $THRESHOLD% | $ICON $STATUS |"
            echo "| Changed Files | ${{ steps.jacoco_report.outputs.coverage-changed-files }}% | 60% | - |"
            echo ""
            echo "Vui lòng kiểm tra chi tiết trong phần bình luận của Pull Request."
          } >> $GITHUB_STEP_SUMMARY

      - name: Enforce Threshold
        run: |
          COVERAGE=${{ steps.jacoco_report.outputs.coverage-overall }}
          if (( $(echo "$COVERAGE <= 70" | bc -l) )); then
            echo "Độ bao phủ code ($COVERAGE%) thấp hơn yêu cầu (70%)!"
            exit 1
          fi
