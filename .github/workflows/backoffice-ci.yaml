name: product service ci

on:
  push:
    branches: ["**"]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/product-ci.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/product-ci.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/workflows/actions

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: product
        run: npm ci

      - name: Build project
        working-directory: product
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets-product
          path: |
            product/dist/**
            product/build/**
          retention-days: 1

      - name: Run Lint
        working-directory: product
        run: npm run lint || true

      - name: Log in to Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./product
          push: true
          tags: ghcr.io/nashtech-garage/yas-product:latest

  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/workflows/actions

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: product
        run: npm ci

      - name: Run Unit Tests & Coverage
        working-directory: product
        run: npm run test -- --coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-product
          path: product/coverage
          retention-days: 1

      - name: Test Summary
        if: always()
        run: |
          echo "## 🧪 Test Result: product" >> $GITHUB_STEP_SUMMARY
          if [ -f product/coverage/coverage-summary.json ]; then
            COVERAGE=$(jq '.total.lines.pct' product/coverage/coverage-summary.json)
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Line Coverage | $COVERAGE% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No coverage report found" >> $GITHUB_STEP_SUMMARY
          fi

  SonarCloud:
    needs: [Build, Test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/workflows/actions

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-product
          path: product/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: product
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar Summary
        if: always()
        run: |
          echo "## SonarCloud Report: product" >> $GITHUB_STEP_SUMMARY
          echo "https://sonarcloud.io/dashboard?id=<YOUR_PROJECT_KEY>" >> $GITHUB_STEP_SUMMARY

  Check-Coverage:
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-product
          path: coverage

      - name: Enforce Coverage Threshold
        run: |
          THRESHOLD=70
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "Coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Coverage thấp hơn yêu cầu!"
            exit 1
          fi

      - name: Coverage Summary
        run: |
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "## 📊 Coverage Summary: product" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Threshold |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overall Coverage | $COVERAGE% | 70% |" >> $GITHUB_STEP_SUMMARY