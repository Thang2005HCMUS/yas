name: inventory service ci

on:
  push:
    branches: ["**"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl inventory -am
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl inventory -am -Dcheckstyle.output.file=inventory-checkstyle-result.xml
      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/inventory-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        with:
          name: Inventory-Service-Test-Results
          path: "inventory/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'
      - name: Upload OWASP Dependency Check results
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
      - name: Analyze with sonar cloud
        
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl inventory -am -f pom.xml
          -Dsonar.coverage.jacoco.xmlReportPaths=inventory/target/site/jacoco/jacoco.xml
      - name: SonarCloud Summary
        if: always()
        run: |
          {
            echo "## SonarCloud Result"
            echo ""
            - Raw result: ${{ steps.sonar.outcome }}
            - Final result: ${{ steps.sonar.conclusion }}
            echo "- Service: **cart**"
            echo "- Branch/Ref: **${{ github.ref_name }}**"
            echo "- Commit: \`${{ github.sha }}\`"
            echo ""
            echo "### Dashboard"
            echo "https://sonarcloud.io/dashboard?id=<YOUR_PROJECT_KEY>"
            echo ""
            echo "> Nếu fail do Quality Gate thì xem log step SonarCloud."
          } >> $GITHUB_STEP_SUMMARY
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1

        with:
          paths: ${{github.workspace}}/inventory/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Inventory Coverage Report'
          update-comment: true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./inventory
          push: true
          tags: ghcr.io/nashtech-garage/yas-inventory:latest