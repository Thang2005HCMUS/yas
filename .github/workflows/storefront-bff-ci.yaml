name: storefront-bff service ci

on:
  push:
    branches: ["**"]
    paths:
      - "storefront-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"

  pull_request:
    branches: ["main"]
    paths:
      - "storefront-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"

  workflow_dispatch:

jobs:

  Build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Maven Build
        run: mvn clean install -pl storefront-bff -am -DskipTests

      - name: Checkstyle
        run: mvn checkstyle:checkstyle -pl storefront-bff -am -Dcheckstyle.output.file=storefront-bff-checkstyle-result.xml

      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/storefront-bff-checkstyle-result.xml'

      - name: Login GHCR
        if: ${ github.ref == 'refs/heads/main' }
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${ github.actor }
          password: ${ secrets.GITHUB_TOKEN }

      - name: Build Docker Image
        if: ${ github.ref == 'refs/heads/main' }
        uses: docker/build-push-action@v6
        with:
          context: ./storefront-bff
          push: true
          tags: ghcr.io/nashtech-garage/yas-storefront-bff:latest

  Test:
    needs: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions

      - name: Run Tests + Generate Coverage
        run: mvn verify -pl storefront-bff -am

      - name: Verify Jacoco Exists
        run: ls -R storefront-bff/target/site/jacoco || true

      - name: Upload Jacoco Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-storefront-bff
          path: storefront-bff/target/site/jacoco/jacoco.xml
          retention-days: 1

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: StorefrontBff-Unit-Test
          path: "storefront-bff/**/*-reports/TEST*.xml"
          reporter: java-junit

  SonarCloud:
    needs: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Download Jacoco
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-storefront-bff
          path: storefront-bff/target/site/jacoco

      - name: Run SonarCloud
        id: sonar
        continue-on-error: true
        env:
          SONAR_TOKEN: ${ secrets.SONAR_TOKEN }
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl storefront-bff -am
          -Dsonar.projectKey=nashtech-garage_yas-storefront-bff
          -Dsonar.organization=nashtech-garage
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=storefront-bff/target/site/jacoco/jacoco.xml

      - name: Sonar Summary
        if: always()
        run: |
          if [ "${{ steps.sonar.outcome }}" = "success" ]; then
            ICON="🟢"
            STATUS="PASS"
          else
            ICON="🔴"
            STATUS="FAIL"
          fi

          echo "## SonarCloud storefront-bff" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | $ICON $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "https://sonarcloud.io/project/overview?id=nashtech-garage_yas-storefront-bff" >> $GITHUB_STEP_SUMMARY

  Coverage:
    needs: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Jacoco
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-storefront-bff
          path: target/jacoco-results

      - name: Coverage Report
        id: jacoco
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: target/jacoco-results/jacoco.xml
          token: ${ secrets.GITHUB_TOKEN }
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: "StorefrontBff Coverage Report"
          update-comment: true

      - name: Coverage Summary
        if: always()
        run: |
          COVERAGE="${{ steps.jacoco.outputs.coverage-overall }}"
          CHANGED="${{ steps.jacoco.outputs.coverage-changed-files }}"

          [ -z "$COVERAGE" ] && COVERAGE=0
          [ -z "$CHANGED" ] && CHANGED=0

          echo "## Coverage storefront-bff" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| Overall | $COVERAGE% |" >> $GITHUB_STEP_SUMMARY
          echo "| Changed Files | $CHANGED% |" >> $GITHUB_STEP_SUMMARY
