name: cart service ci

on:
  push:
    branches: ["**"]
    paths:
      - "cart/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/cart-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "cart/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/cart-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -DskipTests -pl cart -am -f pom.xml
      - name: Run Maven Verify
        run: mvn verify -DskipITs -pl cart -am -f pom.xml
      - name: Run Maven Checkstyle
        
        run: mvn checkstyle:checkstyle -pl cart -am -f pom.xml -Dcheckstyle.output.file=cart-checkstyle-result.xml
      - name: Upload Checkstyle Result      
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/cart-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Cart-Service-Unit-Test-Results
          path: "cart/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Enforce coverage threshold (>=70%)
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          report_path = Path("cart/target/site/jacoco/jacoco.xml")
          if not report_path.exists():
              raise SystemExit("JaCoCo report not found at cart/target/site/jacoco/jacoco.xml")
          root = ET.parse(report_path).getroot()
          line_counter = next((c for c in root.findall("counter") if c.attrib.get("type") == "LINE"), None)
          if line_counter is None:
              raise SystemExit("No LINE counter in JaCoCo report")
          missed = int(line_counter.attrib["missed"])
          covered = int(line_counter.attrib["covered"])
          total = missed + covered
          coverage = (covered / total * 100.0) if total else 0.0
          print(f"Line coverage: {covered}/{total} = {coverage:.2f}%")
          if coverage < 70.0:
              raise SystemExit(f"Coverage gate failed: {coverage:.2f}% < 70.00%")
          PY
      - name: Upload JaCoCo report artifacts
        uses: actions/upload-artifact@v4
        if: ${{ success() || failure() }}
        with:
          name: cart-jacoco-report
          path: |
            cart/target/site/jacoco/index.html
            cart/target/site/jacoco/jacoco.xml
            cart/target/site/jacoco/jacoco.csv
      - name: OWASP Dependency Check
        
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'
      - name: Upload OWASP Dependency Check results
        
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
      - name: Analyze with sonar cloud
        
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -pl cart -am -f pom.xml
          -Dsonar.coverage.jacoco.xmlReportPaths=cart/target/site/jacoco/jacoco.xml
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/cart/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Cart Coverage Report'
          update-comment: true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./cart
          push: true
          tags: ghcr.io/nashtech-garage/yas-cart:latest